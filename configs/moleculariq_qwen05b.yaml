task_name: moleculariq
model_name: Qwen/Qwen2.5-0.5B-Instruct
dataset_path: data/moleculariq_train
output_dir: outputs/moleculariq-qwen0.5b-grpo

moleculariq_task_type: single_count

# GRPO core
learning_rate: 1.0e-5
beta: 0.005
num_generations: 4
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
max_prompt_length: 384
max_completion_length: 384
num_train_epochs: 1
max_steps: -1
warmup_ratio: 0.1
weight_decay: 0.1
max_grad_norm: 0.1
lr_scheduler_type: cosine

seed: 42
logging_steps: 1
save_steps: 100
bf16: true
gradient_checkpointing: true
optim: adamw_8bit

use_soft_format_reward: true
correctness_weight: 2.0
